# Sample fault-injection campaign — Safe-State Controller SEU sweep.
#
# DUT: rtl/safe_state_controller/safe_state_controller.v.
# Wrapper: sim/fault_injection/tb_safe_state_controller_fi.sv drives
# a steady "no fault, NORMAL state" baseline. cocotb runner forces
# SEUs on the safe_state register and the timer; oracle is the
# safe_state output (compared against the expected NORMAL=2'd0).
#
# Aim: most safe_state_controller failure modes are uncovered today
# (FMEDA SPFM 34.80 %). The campaign quantifies the gap and provides
# evidence for F4-A-7 (TMR or Hamming-encode the 2-bit safe_state
# FSM register) impact: post-fix, an SEU on safe_state should be
# detected within 1 cycle. Today an SEU silently propagates.
#
# Campaign size labelled "1k" — actual entries below are a focused
# subset (~25 injections).

name: safe_state_controller_inj_1k
target_module: safe_state_controller
oracle_signal: tb_safe_state_controller_fi.safe_state_seu_detected
expected_safe_response: >
  Pre-F4-A-7: most SEUs on safe_state register are NOT detected
  (no internal mechanism). The campaign records the baseline.
  Post-F4-A-7: every SEU on the 2-bit safe_state register must be
  detected within 1 cycle by the new TMR / Hamming check, which
  asserts tb_safe_state_controller_fi.safe_state_seu_detected.
fmeda_failure_mode_ids:
  - safe_state_controller.state.seu
  - safe_state_controller.timer.seu
  - safe_state_controller.max_speed.seu
  - safe_state_controller.transition_logic.stuck

injections:
  # SEU on safe_state itself — both bits, both directions.
  - { target_path: tb_safe_state_controller_fi.u_dut.safe_state, bit_index: 0, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: false }   # pre-F4-A-7 baseline
  - { target_path: tb_safe_state_controller_fi.u_dut.safe_state, bit_index: 1, kind: bit_flip, start_cycle: 200, duration_cycles: 1, expected_detection: false }
  - { target_path: tb_safe_state_controller_fi.u_dut.safe_state, bit_index: 0, kind: stuck_1, start_cycle: 300, duration_cycles: 30, expected_detection: false }
  - { target_path: tb_safe_state_controller_fi.u_dut.safe_state, bit_index: 1, kind: stuck_1, start_cycle: 500, duration_cycles: 30, expected_detection: false }
  # After F4-A-7 lands: the lines above flip to expected_detection: true.
  # Re-run this same campaign post-fix; coverage should swing 0 % → 100 %.

  # SEU on max_speed — combinational with safe_state in current encoding,
  # but FF still vulnerable.
  - { target_path: tb_safe_state_controller_fi.u_dut.max_speed_kmh, bit_index: 0, kind: bit_flip, start_cycle: 700, duration_cycles: 1, expected_detection: false }
  - { target_path: tb_safe_state_controller_fi.u_dut.max_speed_kmh, bit_index: 7, kind: bit_flip, start_cycle: 800, duration_cycles: 1, expected_detection: false }

  # SEU on latched_faults — informational, no safety gate.
  - { target_path: tb_safe_state_controller_fi.u_dut.latched_faults, bit_index: 0,  kind: bit_flip, start_cycle: 900, duration_cycles: 1, expected_detection: false }
  - { target_path: tb_safe_state_controller_fi.u_dut.latched_faults, bit_index: 8,  kind: bit_flip, start_cycle: 950, duration_cycles: 1, expected_detection: false }

  # SEU on a critical_faults input bit (testbench drives it high for 1 cycle):
  # measures whether escalation kicks in. expected_detection: true because
  # safe_state should advance NORMAL → ALERT and tb's oracle catches the
  # state change.
  - { target_path: tb_safe_state_controller_fi.critical_faults_reg, bit_index: 0, kind: stuck_1, start_cycle: 1100, duration_cycles: 100, expected_detection: true }
