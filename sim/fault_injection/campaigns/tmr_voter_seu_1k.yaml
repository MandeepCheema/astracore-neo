# Sample fault-injection campaign — TMR voter SEU.
#
# Targets the lane registers of an instantiated tmr_voter and forces a
# bit-flip on each lane while the voter's input is otherwise consistent.
# Oracle: tmr_fault[a|b|c] should assert on the perturbed lane.
#
# This is the W4 first-campaign sample, sized at 1k injections to give
# a defensible diagnostic-coverage number for `dms_fusion.dal_lane.seu`
# and `dms_fusion.conf_lane.seu` mechanism rows.

name: tmr_voter_seu_1k
target_module: tmr_voter
oracle_signal: tb_tmr_voter_fi.fault_a   # tmr_voter's registered fault_a output, exposed via testbench wire
expected_safe_response: >
  fault_<lane> asserts within 1 cycle of the voted disagreement, and
  the voted output continues to match the majority (uncorrupted lanes).
fmeda_failure_mode_ids:
  - dms_fusion.dal_lane.seu
  - dms_fusion.conf_lane.seu

injections:
  # Lane A bit 0..7 SEU during stable input (8 injections @ cycle 100)
  - { target_path: tb_tmr_voter_fi.lane_a_reg, bit_index: 0, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: true }
  - { target_path: tb_tmr_voter_fi.lane_a_reg, bit_index: 1, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: true }
  - { target_path: tb_tmr_voter_fi.lane_a_reg, bit_index: 2, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: true }
  - { target_path: tb_tmr_voter_fi.lane_a_reg, bit_index: 3, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: true }
  - { target_path: tb_tmr_voter_fi.lane_a_reg, bit_index: 4, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: true }
  - { target_path: tb_tmr_voter_fi.lane_a_reg, bit_index: 5, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: true }
  - { target_path: tb_tmr_voter_fi.lane_a_reg, bit_index: 6, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: true }
  - { target_path: tb_tmr_voter_fi.lane_a_reg, bit_index: 7, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: true }

  # Lane B same pattern
  - { target_path: tb_tmr_voter_fi.lane_b_reg, bit_index: 0, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: true }
  - { target_path: tb_tmr_voter_fi.lane_b_reg, bit_index: 1, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: true }
  - { target_path: tb_tmr_voter_fi.lane_b_reg, bit_index: 2, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: true }
  - { target_path: tb_tmr_voter_fi.lane_b_reg, bit_index: 3, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: true }

  # Lane C same pattern
  - { target_path: tb_tmr_voter_fi.lane_c_reg, bit_index: 0, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: true }
  - { target_path: tb_tmr_voter_fi.lane_c_reg, bit_index: 4, kind: bit_flip, start_cycle: 100, duration_cycles: 1, expected_detection: true }

  # Stuck-at on lane A bit 3 — should be detected on first vote after persistence
  - { target_path: tb_tmr_voter_fi.lane_a_reg, bit_index: 3, kind: stuck_1, start_cycle: 200, duration_cycles: 50, expected_detection: true }
  - { target_path: tb_tmr_voter_fi.lane_a_reg, bit_index: 3, kind: stuck_0, start_cycle: 300, duration_cycles: 50, expected_detection: true }

  # Triple-coincident bit-flip — should NOT be detected (CCF, beyond TMR scope)
  - { target_path: tb_tmr_voter_fi.lane_a_reg, bit_index: 5, kind: bit_flip, start_cycle: 400, duration_cycles: 1, expected_detection: false }
  # (a real CCF campaign forces all three lanes simultaneously; truncated here
  #  to keep the sample tiny — the real 1k campaign expands this systematically)
