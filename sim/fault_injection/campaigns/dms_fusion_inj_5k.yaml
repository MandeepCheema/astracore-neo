# Sample fault-injection campaign — DMS Fusion SEU sweep.
#
# DUT: rtl/dms_fusion/dms_fusion.v (now includes the F4-A-5 shadow
# register fix on tmr_valid_r).
# Wrapper: sim/fault_injection/tb_dms_fusion_fi.sv drives a steady
# "attentive driver" stimulus (eye_state=OPEN, in_zone=1, normal
# blink rate). cocotb runner forces SEUs on internal regs and checks
# the dms_fusion outputs (driver_attention_level, dms_alert,
# tmr_fault) for spurious or missed transitions.
#
# Aim: validate the conservative DC declared in safety_mechanisms.yaml
# for the counter / IIR / blink-window mechanisms. Expected: measured
# DC > declared target, allowing us to raise the declared targets and
# improve module-level SPFM in the FMEDA re-run (per remediation plan
# Phase C). Also validates the F4-A-5 fix end-to-end (SEU on
# tmr_valid_r MUST trip tmr_fault via the new tmr_valid_seu wire).
#
# Campaign size labelled "5k" — actual entries below are a focused
# subset (~50 injections) per failure-mode class.

name: dms_fusion_inj_5k
target_module: dms_fusion
oracle_signal: tb_dms_fusion_fi.tmr_fault
expected_safe_response: >
  tmr_fault asserts within 1-2 cycles of any SEU that perturbs an
  output (driver_attention_level, dms_confidence, dms_alert). The
  TMR voter catches per-lane SEUs on dal/conf; the F4-A-5 shadow
  comparator catches SEUs on tmr_valid_r; counter/IIR SEUs may not
  trip tmr_fault but should self-correct within the documented
  bounded window — those rows have expected_detection set per the
  mechanism's nature.
fmeda_failure_mode_ids:
  - dms_fusion.dal_lane.seu
  - dms_fusion.conf_lane.seu
  - dms_fusion.tmr_valid.seu
  - dms_fusion.cont_closed.seu
  - dms_fusion.cont_distracted.seu
  - dms_fusion.score_filt.seu
  - dms_fusion.blink_snapshot.seu
  - dms_fusion.blink_frame_cnt.seu
  - dms_fusion.blink_elevated.seu
  - dms_fusion.sensor_fail.seu

injections:
  # F4-A-5 validation: SEU on tmr_valid_r must trip tmr_fault via the
  # new tmr_valid_seu shadow comparator.
  - { target_path: tb_dms_fusion_fi.u_dut.tmr_valid_r,        bit_index: null, kind: bit_flip, start_cycle: 500,  duration_cycles: 1, expected_detection: true }
  - { target_path: tb_dms_fusion_fi.u_dut.tmr_valid_r_shadow, bit_index: null, kind: bit_flip, start_cycle: 600,  duration_cycles: 1, expected_detection: true }

  # TMR-covered lanes — voter catches single-lane perturbations.
  - { target_path: tb_dms_fusion_fi.u_dut.dal_a, bit_index: 0, kind: bit_flip, start_cycle: 700,  duration_cycles: 1, expected_detection: true }
  - { target_path: tb_dms_fusion_fi.u_dut.dal_a, bit_index: 1, kind: bit_flip, start_cycle: 700,  duration_cycles: 1, expected_detection: true }
  - { target_path: tb_dms_fusion_fi.u_dut.dal_a, bit_index: 2, kind: bit_flip, start_cycle: 700,  duration_cycles: 1, expected_detection: true }
  - { target_path: tb_dms_fusion_fi.u_dut.dal_b, bit_index: 0, kind: bit_flip, start_cycle: 800,  duration_cycles: 1, expected_detection: true }
  - { target_path: tb_dms_fusion_fi.u_dut.dal_c, bit_index: 0, kind: bit_flip, start_cycle: 900,  duration_cycles: 1, expected_detection: true }
  - { target_path: tb_dms_fusion_fi.u_dut.conf_a, bit_index: 4, kind: bit_flip, start_cycle: 1000, duration_cycles: 1, expected_detection: true }
  - { target_path: tb_dms_fusion_fi.u_dut.conf_b, bit_index: 4, kind: bit_flip, start_cycle: 1100, duration_cycles: 1, expected_detection: true }
  - { target_path: tb_dms_fusion_fi.u_dut.conf_c, bit_index: 4, kind: bit_flip, start_cycle: 1200, duration_cycles: 1, expected_detection: true }

  # Counter SEUs — periodic-reset mechanism. Expected detection MAY be
  # false (SEU clears at next non-CLOSED frame); the campaign measures
  # what the actual residency / detection rate is.
  - { target_path: tb_dms_fusion_fi.u_dut.cont_closed,     bit_index: 3, kind: bit_flip, start_cycle: 1500, duration_cycles: 1, expected_detection: false }
  - { target_path: tb_dms_fusion_fi.u_dut.cont_distracted, bit_index: 3, kind: bit_flip, start_cycle: 1700, duration_cycles: 1, expected_detection: false }

  # IIR-smoothed score SEU — IIR attenuates by ~75 % per cycle.
  - { target_path: tb_dms_fusion_fi.u_dut.score_filt_x4, bit_index: 6, kind: bit_flip, start_cycle: 2000, duration_cycles: 1, expected_detection: false }
  - { target_path: tb_dms_fusion_fi.u_dut.score_filt_x4, bit_index: 7, kind: bit_flip, start_cycle: 2100, duration_cycles: 1, expected_detection: false }

  # Blink-window state SEUs.
  - { target_path: tb_dms_fusion_fi.u_dut.blink_frame_cnt, bit_index: 2, kind: bit_flip, start_cycle: 2300, duration_cycles: 1, expected_detection: false }
  - { target_path: tb_dms_fusion_fi.u_dut.blink_snapshot,  bit_index: 8, kind: bit_flip, start_cycle: 2400, duration_cycles: 1, expected_detection: false }
  - { target_path: tb_dms_fusion_fi.u_dut.blink_elevated,  bit_index: null, kind: bit_flip, start_cycle: 2500, duration_cycles: 1, expected_detection: false }

  # Sensor-fail flag SEU — TMR catches the propagated wrong vote.
  - { target_path: tb_dms_fusion_fi.u_dut.sensor_fail, bit_index: null, kind: bit_flip, start_cycle: 2700, duration_cycles: 1, expected_detection: true }

  # Watchdog counter SEU — bounded by next gaze_valid pulse.
  - { target_path: tb_dms_fusion_fi.u_dut.wdog_cnt, bit_index: 12, kind: bit_flip, start_cycle: 2900, duration_cycles: 1, expected_detection: false }

  # Stuck-at on a TMR lane — voter persists fault flag while stuck.
  - { target_path: tb_dms_fusion_fi.u_dut.dal_a, bit_index: 1, kind: stuck_1, start_cycle: 3100, duration_cycles: 50, expected_detection: true }
  - { target_path: tb_dms_fusion_fi.u_dut.dal_a, bit_index: 1, kind: stuck_0, start_cycle: 3200, duration_cycles: 50, expected_detection: true }
