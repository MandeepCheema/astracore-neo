# =============================================================================
# AstraCore Neo — GazeTracker single-module OpenLane 2 config
# Use this for a quick RTL-to-GDSII test run before tackling the full chip.
# Target: sky130A | sky130_fd_sc_hd | 50 MHz
# =============================================================================

DESIGN_NAME: gaze_tracker
VERILOG_FILES: dir::../rtl/gaze_tracker/gaze_tracker.v

CLOCK_PORT: clk
CLOCK_PERIOD: 20.0   # 50 MHz

PNR_SDC_FILE: dir::scripts/base.sdc
SIGNOFF_SDC_FILE: dir::scripts/base.sdc

# Floorplan — small die for a single module
FP_SIZING: absolute
DIE_AREA: [0, 0, 200, 200]
FP_CORE_UTIL: 45
FP_ASPECT_RATIO: 1

# Placement
PL_TARGET_DENSITY_PCT: 50

# Synthesis
SYNTH_STRATEGY: DELAY 0
MAX_FANOUT_CONSTRAINT: 10

# CTS
RUN_CTS: true

# Routing
DRT_THREADS: 4

# Signoff — all enabled by default, override only if needed
# RUN_FILL_INSERTION: true
# RUN_MAGIC_DRC: true
# RUN_LVS: true

pdk::sky130*:
  FP_PDN_VOFFSET: 5
  FP_PDN_HOFFSET: 5
  GPL_CELL_PADDING: 4
  DPL_CELL_PADDING: 4
