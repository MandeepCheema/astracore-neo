name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------
  # Python regression — the full 1400+ test suite minus the
  # integration-tagged ones (which need real silicon).
  # --------------------------------------------------------------------
  pytest:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest
        run: pytest -m "not integration" --tb=short -q

      - name: Upload pytest junit (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            .pytest_cache/
            reports/

  # --------------------------------------------------------------------
  # C++ runtime build + conformance gate.
  # Linux only — Windows MSVC path documented in cpp/README.md but not
  # yet wired into CI (Phase B).
  # --------------------------------------------------------------------
  cpp-build:
    name: cpp runtime build + conformance
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python3-dev + build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev build-essential

      - name: Install Python deps (ORT + pybind11 + astracore)
        run: |
          python -m pip install --upgrade pip
          pip install pybind11 onnxruntime
          pip install -e ".[dev]"

      - name: Build astracore_runtime extension
        run: bash cpp/build.sh

      - name: C++ runtime pytest (cross-runtime conformance gate)
        run: pytest tests/test_cpp_runtime.py -v --tb=short

  # --------------------------------------------------------------------
  # LEADERBOARD regeneration idempotence check — runs every commit,
  # publishes the regenerated file on the main branch so readers see
  # numbers matching HEAD.
  # --------------------------------------------------------------------
  leaderboard:
    name: regenerate LEADERBOARD.md
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Sanity — leaderboard script idempotent
        run: |
          python scripts/make_leaderboard.py
          pytest tests/test_leaderboard.py -q

      - name: Upload LEADERBOARD artifact
        uses: actions/upload-artifact@v4
        with:
          name: leaderboard
          path: |
            LEADERBOARD.md
            reports/leaderboard.json
            reports/leaderboard_reproduce.md

  # --------------------------------------------------------------------
  # Linting — deliberately loose today; tighten as the team grows.
  # --------------------------------------------------------------------
  lint:
    name: lint + style
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install ruff
      - name: ruff (non-blocking advisory for now)
        continue-on-error: true
        run: ruff check astracore/ tools/ scripts/ tests/
